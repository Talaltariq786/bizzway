name: bizlabel_pro
description: "White-Label Multi-Business SaaS App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/branding/